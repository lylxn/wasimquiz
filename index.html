<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wasim's Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="quiz-section">
    <div class="quiz-header">
      <h1 class="quiz-title">Wasim's Quiz</h1>
      <p class="quiz-sub">How well do you know him? 🏙️</p>
    </div>

    <div class="quiz-questions">

      <div class="q-card">
        <p class="q-label"><span class="q-num">01</span>What's Wasim's favourite colour?</p>
        <div class="options" id="q1">
          <button class="opt" data-val="orange" onclick="pick(this,'q1')">Orange</button>
          <button class="opt" data-val="blue"   onclick="pick(this,'q1')">Blue</button>
          <button class="opt" data-val="black"  onclick="pick(this,'q1')">Black</button>
          <button class="opt" data-val="green"  onclick="pick(this,'q1')">Green</button>
        </div>
      </div>

      <div class="q-card">
        <p class="q-label"><span class="q-num">02</span>What's his favourite season?</p>
        <div class="options" id="q2">
          <button class="opt" data-val="autumn" onclick="pick(this,'q2')">Autumn</button>
          <button class="opt" data-val="summer" onclick="pick(this,'q2')">Summer</button>
          <button class="opt" data-val="winter" onclick="pick(this,'q2')">Winter</button>
          <button class="opt" data-val="spring" onclick="pick(this,'q2')">Spring</button>
        </div>
      </div>

      <div class="q-card">
        <p class="q-label"><span class="q-num">03</span>What's his hair type?</p>
        <div class="options" id="q3">
          <button class="opt" data-val="wavy"     onclick="pick(this,'q3')">Wavy</button>
          <button class="opt" data-val="straight" onclick="pick(this,'q3')">Straight</button>
          <button class="opt" data-val="curly"    onclick="pick(this,'q3')">Curly</button>
          <button class="opt" data-val="coily"    onclick="pick(this,'q3')">Coily</button>
        </div>
      </div>

      <div class="q-card">
        <p class="q-label"><span class="q-num">04</span>What's his house?</p>
        <div class="options" id="q4">
          <button class="opt" data-val="hawk"       onclick="pick(this,'q4')">Hawk</button>
          <button class="opt" data-val="gryffindor" onclick="pick(this,'q4')">Owl</button>
          <button class="opt" data-val="slytherin"  onclick="pick(this,'q4')">Falcon</button>
          <button class="opt" data-val="ravenclaw"  onclick="pick(this,'q4')">Eagle</button>
        </div>
      </div>

      <div class="q-card">
        <p class="q-label"><span class="q-num">05</span>What's his favourite drink?</p>
        <div class="options" id="q5">
          <button class="opt" data-val="water"  onclick="pick(this,'q5')">Water</button>
          <button class="opt" data-val="coffee" onclick="pick(this,'q5')">Coffee</button>
          <button class="opt" data-val="juice"  onclick="pick(this,'q5')">Juice</button>
          <button class="opt" data-val="energy" onclick="pick(this,'q5')">Energy drink</button>
        </div>
      </div>

    </div>

    <button class="check-btn" onclick="checkQuiz()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
        <path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
      </svg>
      See my results
    </button>

    <div class="result-card" id="result" style="display:none">
      <div class="result-score" id="result-score"></div>
      <p class="result-title" id="result-title"></p>
      <p class="result-body"  id="result-body"></p>
      <button class="retry-btn" onclick="retryQuiz()">Try again</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
